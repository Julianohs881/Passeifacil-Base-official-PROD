name: Check Expired Subscriptions

on:
  schedule:
    - cron: '0 2 * * *'  # Todos os dias às 2h da manhã
  workflow_dispatch:  # Permite execução manual

jobs:
  check-subscriptions:
    runs-on: ubuntu-latest
    steps:
      - name: Check expired subscriptions
        run: |
          echo "🔍 Verificando assinaturas expiradas..."
          
          response=$(curl -s -w "\n%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/check-expired-subscriptions" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")
          
          # Separar resposta e código HTTP
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)
          
          echo "📊 Status Code: $http_code"
          echo "📄 Response: $body"
          
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Verificação concluída com sucesso!"
          else
            echo "❌ Erro na verificação: $http_code"
            exit 1
          fi 